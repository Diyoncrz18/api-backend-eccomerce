spring.application.name=api-backend-eccomerce
spring.config.import=optional:file:.env[.properties]

api.prefix=/api/v1

# ─── MySQL Configuration ─────────────────────────────────────────────────────
# Nilai diambil dari .env / environment variables sistem
# Jalankan: set DB_PASSWORD=passwordmu  (Windows)
#        atau  export DB_PASSWORD=passwordmu  (Mac/Linux)
# sebelum menjalankan: mvn spring-boot:run
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:backend_final}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── HikariCP Connection Pool ─────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ─── Problem Details RFC 7807 ─────────────────────────────────────────────────
spring.mvc.problemdetails.enabled=true

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8081}
server.error.include-message=always
server.error.include-binding-errors=always

# ─── CORS ─────────────────────────────────────────────────────────────────────
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.backend.demo=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── JWT Security ─────────────────────────────────────────────────────────────
app.useSecureCookie=${USE_SECURE_COOKIE:false}
auth.token.accessExpirationInMils=${JWT_ACCESS_EXPIRATION_MS:7200000}
auth.token.refreshExpirationInMils=${JWT_REFRESH_EXPIRATION_MS:10800000}
auth.token.jwtSecret=${JWT_SECRET:36763979244226452948404D635166546A576D5A7134743777217A25432A462D}

# ─── Spring Boot Web Stack (must stay as Servlet/Tomcat when webflux is present) ──
spring.main.web-application-type=servlet

# ─── RAG Chatbot (Gemini API) ─────────────────────────────────────────────────
# Dapatkan API key gratis di: https://aistudio.google.com/app/apikey
# Simpan di file .env: GEMINI_API_KEY=your_key_here
rag.gemini.api-key=${GEMINI_API_KEY:}
rag.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
# gemini-2.5-flash-lite = best free-tier quota (~1000 RPD). Upgrade ke 'gemini-2.5-flash'
# atau 'gemini-2.5-pro' untuk kualitas lebih tinggi (RPD jauh lebih kecil, 20-100/day).
rag.gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}
rag.gemini.timeout-ms=${GEMINI_TIMEOUT_MS:20000}
rag.gemini.temperature=${GEMINI_TEMPERATURE:0.7}
rag.gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:500}
# Gemini 2.5 "thinking" budget. 0 = disabled (all tokens go to answer, best for chat).
# -1 = let model decide. >0 = upper bound on internal thinking tokens.
rag.gemini.thinking-budget=${GEMINI_THINKING_BUDGET:0}
# Retry on transient upstream errors (503/429/5xx/timeout). Exponential backoff.
rag.gemini.retry.max-attempts=${GEMINI_RETRY_ATTEMPTS:3}
rag.gemini.retry.initial-backoff-ms=${GEMINI_RETRY_BACKOFF_MS:500}
rag.retrieval.top-k=${RAG_TOP_K:6}
rag.history.max-messages=${RAG_HISTORY_MAX:6}

# ─── RAG Phase 2 - Semantic Embeddings ────────────────────────────────────────
# Uses Gemini embedding API for semantic product retrieval.
# Free tier: 1,500 requests/minute. One-time bootstrap + on-demand per query.
# Model: gemini-embedding-001 (Matryoshka, 3072 native dims, truncatable).
rag.embedding.model=${EMBEDDING_MODEL:gemini-embedding-001}
# Output dims via Matryoshka truncation (1-3072). 768 is a good speed/quality balance.
rag.embedding.dimensions=${EMBEDDING_DIMENSIONS:768}
rag.embedding.batch-size=${EMBEDDING_BATCH_SIZE:25}
rag.embedding.enabled=${EMBEDDING_ENABLED:true}
# Bootstrap on startup: compute embeddings for products missing them.
# Set false for quicker startup if you don't need semantic search.
rag.embedding.bootstrap-on-startup=${EMBEDDING_BOOTSTRAP:true}
# Hybrid ranking: final_score = semantic_weight * cosine + keyword_weight * normalized_keyword
rag.retrieval.semantic-weight=${RAG_SEMANTIC_WEIGHT:0.65}
rag.retrieval.keyword-weight=${RAG_KEYWORD_WEIGHT:0.35}
